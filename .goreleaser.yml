project_name: terraform-provider-googleworkspace

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    binary: terraform-provider-googleworkspace
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: zip

checksum:
  name_template: "terraform-provider-googleworkspace_{{ .Version }}_SHA256SUMS"

signs:
  - artifacts: checksum

release:
  github:
    owner: chloetamba
    name: terraform-provider-googleworkspace